name: Build sdist and wheels
on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pypa/build
        run: python -m pip install build
      - name: Build source distribution
        run: python -m build --sdist --outdir dist .
      - name: Upload sdist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: motep-sdist
          path: dist/*.tar.gz
          retention-days: 5
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel
      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux*"
          CIBW_TEST_COMMAND: >-
            python -c "from motep.potentials.mtp.cext import _mtp_cext"
        run: python -m cibuildwheel --output-dir dist
      - name: Upload built wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: motep-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 5
  test_built_wheels:
    name: Test built wheels on ${{ matrix.os }} / numpy=${{ matrix.numpy }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        numpy:
          - "==1.23.5"
          - ">=2,<3"
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: tests
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download built wheels
        uses: actions/download-artifact@v4
        with:
          name: motep-${{ matrix.os }}
          path: dist
      - name: Install runtime NumPy and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy${{ matrix.numpy }}" ase scipy numba jax pytest
      - name: Install built wheel
        run: python -m pip install --no-deps dist/*cp311*.whl
      - name: Run pytest
        run: |
          python -m pytest -v tests/test_mtp.py
